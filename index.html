<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro - Tracker Allenamento</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <!-- Apple Web App Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <!-- Header / Barra Superiore -->
    <header>
        <div class="logo">🏋️‍♂️ FitTrack Pro</div>
        <div class="subtitle">Personalizzazione & Notifiche Native</div>
    </header>

    <main class="container">
        <!-- Pannello Timer e Stato -->
        <section class="card timer-card">
            <div class="timer-header">
                <h2>Timer di Recupero</h2>
                <button id="btnRequestNotif" class="btn btn-small btn-secondary">🔔 Attiva Notifiche</button>
            </div>
            <div class="timer-display" id="timerDisplay">01:30</div>
            
            <!-- Setup Recupero Personalizzato -->
            <div class="custom-timer-setup">
                <label for="customTimerInput">Recupero predefinito per il prossimo esercizio:</label>
                <div class="input-append">
                    <input type="number" id="customTimerInput" min="5" max="600" value="90" placeholder="Secondi">
                    <button id="btnSetCustomTimer" class="btn btn-secondary">Imposta</button>
                </div>
            </div>

            <div class="timer-controls">
                <button id="btnTimerToggle" class="btn btn-primary">Avvia Recupero</button>
                <button id="btnTimerReset" class="btn btn-secondary">Reset</button>
            </div>
        </section>

        <!-- Form Inserimento Esercizio -->
        <section class="card form-card">
            <h2>Registra Serie</h2>
            <form id="workoutForm">
                <div class="form-group">
                    <label for="exerciseSelect">Esercizio</label>
                    <div class="select-wrapper">
                        <select id="exerciseSelect" required>
                            <option value="Panca Piana">🏋️ Panca Piana</option>
                            <option value="Squat">🦵 Squat</option>
                            <option value="Trazioni">💪 Trazioni sbarra</option>
                            <option value="Stacco da terra">🔥 Stacco da terra</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="weightInput">Peso (Kg)</label>
                        <input type="number" id="weightInput" min="0" step="0.5" placeholder="es. 60" required>
                    </div>
                    <div class="form-group">
                        <label for="repsInput">Ripetizioni</label>
                        <input type="number" id="repsInput" min="0" placeholder="es. 10" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-success btn-block">Salva Serie & Riposa</button>
            </form>
        </section>

        <!-- Gestione ed Inserimento Nuovi Esercizi Personali -->
        <section class="card custom-exercise-card">
            <h2>Aggiungi Nuovo Tipo di Esercizio</h2>
            <div class="form-group">
                <label for="newExerciseInput">Nome Esercizio</label>
                <div class="input-append">
                    <input type="text" id="newExerciseInput" placeholder="es. Leg Press, Shoulder Press...">
                    <button id="btnAddExercise" class="btn btn-primary">Aggiungi</button>
                </div>
            </div>
        </section>

        <!-- Lista Allenamento del Giorno -->
        <section class="card list-card">
            <div class="list-header">
                <h2>Sessione Odierna</h2>
                <button id="btnClearHistory" class="btn btn-danger-text">Svuota Tutto</button>
            </div>
            <div id="emptyState" class="empty-state">
                Nessuna serie registrata oggi. Inizia ad allenarti!
            </div>
            <ul class="workout-list" id="workoutList">
                <!-- Inserito dinamicamente via JS -->
            </ul>
        </section>
    </main>

    <!-- Notifica di installazione / Stato PWA -->
    <div id="pwaToast" class="pwa-toast hidden">
        <span id="toastMessage">App pronta per l'uso offline!</span>
        <button id="closeToast">OK</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
